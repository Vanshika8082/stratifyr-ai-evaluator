services:
  - type: web
    name: stratifyr-backend
    env: python
    plan: free # Force the free tier
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false

  - type: static # Corrected type for a free Static Site
    name: stratifyr-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: stratifyr-backend
          envVarKey: RENDER_EXTERNAL_URL
